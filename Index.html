<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMANDER - MARSELLO GUARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center gap-6 glass p-6 rounded-[30px]">
        <div>
            <h1 class="text-3xl font-black italic text-emerald-400 tracking-tighter">MARSELLO <span class="text-white">COMMANDER</span></h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em]">Operational Monitoring System</p>
        </div>
        <div class="flex gap-3 w-full md:w-auto">
            <input id="form-link" type="text" placeholder="Paste Link Google Form (Embedded)" class="flex-1 md:w-80 bg-slate-900 border border-slate-800 p-3 rounded-xl text-xs outline-none focus:border-emerald-500 transition">
            <button onclick="updateSoal()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-xl text-xs font-black transition active:scale-95">KIRIM SOAL</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-12 gap-6">
        
        <section class="col-span-12 lg:col-span-8">
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Live Examinee Grid</h2>
                <span id="user-count" class="bg-emerald-500/10 text-emerald-500 text-[10px] px-3 py-1 rounded-full border border-emerald-500/20 font-bold">0 Peserta</span>
            </div>
            
            <div id="monitor-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <div class="col-span-full py-20 text-center glass rounded-[40px]">
                    <p class="text-slate-600 italic">Menunggu peserta masuk...</p>
                </div>
            </div>
        </section>

        <section class="col-span-12 lg:col-span-4 space-y-6">
            <div class="glass p-6 rounded-[40px] h-[80vh] flex flex-col border-rose-500/10 border">
                <h2 class="text-rose-500 font-black text-xs uppercase tracking-widest mb-6 flex items-center gap-2">
                    <span class="w-2 h-2 bg-rose-600 rounded-full animate-ping"></span> Security Violations
                </h2>
                <div id="logs" class="flex-1 overflow-y-auto space-y-3 pr-2">
                    <p class="text-[10px] text-slate-600 italic text-center mt-10 italic">Belum ada pelanggaran terdeteksi.</p>
                </div>
                <button onclick="clearLogs()" class="mt-4 text-[10px] text-slate-500 hover:text-rose-500 transition uppercase font-bold tracking-widest">Clear Logs</button>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // WAJIB: SAMAKAN DENGAN CONFIG DI INDEX.HTML
        const firebaseConfig = {
            apiKey: "MASUKKAN_API_KEY",
            databaseURL: "MASUKKAN_URL_DATABASE",
            projectId: "ID_PROJECT",
            appId: "ID_APP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. UPDATE LINK SOAL
        window.updateSoal = () => {
            const url = document.getElementById('form-link').value;
            if(!url) return alert("Masukkan link dulu!");
            set(ref(db, 'current_form_url'), url);
            alert("Soal Terupdate ke Semua Peserta!");
        };

        // 2. MONITORING PESERTA & FOTO WAJAH
        onValue(ref(db, 'users'), (snap) => {
            const grid = document.getElementById('monitor-grid');
            const countLabel = document.getElementById('user-count');
            grid.innerHTML = "";
            let count = 0;

            snap.forEach((child) => {
                count++;
                const name = child.key;
                const d = child.val();
                const photo = d.livePhoto || "https://via.placeholder.com/240x180?text=Kamera+Off";
                const isPending = d.status === 'pending';
                const isLocked = d.status === 'locked';

                const div = document.createElement('div');
                div.className = `glass p-4 rounded-[30px] border transition-all duration-500 ${isPending ? 'border-amber-500/50 bg-amber-500/5' : isLocked ? 'border-rose-500/50 bg-rose-500/5' : 'border-slate-800'}`;
                
                div.innerHTML = `
                    <div class="relative rounded-2xl overflow-hidden mb-4 aspect-video bg-black shadow-inner">
                        <img src="${photo}" class="w-full h-full object-cover">
                        ${isPending ? '<div class="absolute inset-0 bg-amber-500/20 flex items-center justify-center font-black text-amber-500 text-xs">MENUNGGU IZIN</div>' : ''}
                    </div>
                    
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <p class="font-black text-xs uppercase tracking-tighter truncate w-32">${name}</p>
                            <p class="text-[8px] text-slate-500 uppercase">${d.status}</p>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="updateStatus('${name}', 'approved')" class="p-2 bg-emerald-600/20 text-emerald-500 rounded-lg hover:bg-emerald-600 hover:text-white transition shadow-sm shadow-emerald-900/10">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"></path></svg>
                            </button>
                            <button onclick="updateStatus('${name}', 'locked')" class="p-2 bg-rose-600/20 text-rose-500 rounded-lg hover:bg-rose-600 hover:text-white transition shadow-sm shadow-rose-900/10">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3"></path></svg>
                            </button>
                        </div>
                    </div>
                `;

                // FITUR IZIN KELUAR (EXIT REQUEST)
                if (d.requestExit && d.requestExit.status === 'waiting') {
                    const exitBox = document.createElement('div');
                    exitBox.className = "mt-2 p-3 bg-amber-500 rounded-2xl text-black animate-bounce";
                    exitBox.innerHTML = `
                        <p class="text-[9px] font-black uppercase mb-1">Minta Keluar!</p>
                        <p class="text-[10px] leading-tight mb-2">"${d.requestExit.reason}"</p>
                        <button onclick="allowExit('${name}')" class="w-full bg-black text-white text-[9px] py-2 rounded-lg font-bold">IZINKAN</button>
                    `;
                    div.appendChild(exitBox);
                }

                grid.appendChild(div);
            });
            countLabel.innerText = `${count} Peserta`;
        });

        // 3. MONITORING LOG PELANGGARAN
        const logQuery = query(ref(db, 'logs'), limitToLast(30));
        onValue(logQuery, (snap) => {
            const logBox = document.getElementById('logs');
            logBox.innerHTML = "";
            snap.forEach((child) => {
                const data = child.val();
                const div = document.createElement('div');
                div.className = "bg-slate-900/50 border-l-2 border-rose-600 p-3 rounded-r-xl transition-all hover:bg-slate-800";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-rose-500 text-[10px] uppercase">${data.user}</span>
                        <span class="text-[8px] text-slate-600 font-mono">${data.time}</span>
                    </div>
                    <p class="text-[10px] text-slate-300 leading-relaxed">${data.violation}</p>
                `;
                logBox.prepend(div); // Munculkan yang terbaru di atas
            });
        });

        // FUNGSI AKSI ADMIN
        window.updateStatus = (name, status) => set(ref(db, `users/${name}/status`), status);
        window.allowExit = (name) => set(ref(db, `users/${name}/requestExit/status`), 'allowed');
        window.clearLogs = () => { if(confirm("Hapus semua riwayat pelanggaran?")) remove(ref(db, 'logs')); };

    </script>
</body>
</html>
